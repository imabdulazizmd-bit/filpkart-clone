<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart UI Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Flipkart</div>
        <input type="text" placeholder="Search for products..." class="search-bar">
        <button class="login-btn">Login</button>
        <div class="cart">Cart 🛒</div>
    </header>

    <!-- Categories -->
    <section class="categories">
        <div>Mobiles</div>
        <div>Fashion</div>
        <div>Electronics</div>
        <div>Home</div>
        <div>Appliances</div>
        <div>Travel</div>
    </section>

    <!-- Banner -->
    <section class="banner">
        <h1>Big Billion Days Sale</h1>
        <p>Up to 80% Off</p>
    </section>

    <!-- Products -->
    <section class="products">
        <div class="product-card">
            <img src="https://via.placeholder.com/150">
            <h3>Product 1</h3>
            <p>₹999</p>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/150">
            <h3>Product 2</h3>
            <p>₹1499</p>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/150">
            <h3>Product 3</h3>
            <p>₹799</p>
        </div>
    </section>

</body>
</html>
